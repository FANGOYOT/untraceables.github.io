<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <link rel="preload" href="image1.jpg" as="image">
    <link rel="preload" href="image2.jpg" as="image">
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "My Website",
            "url": "https://example.com",
            "sameAs": [
                "https://www.facebook.com/",
                "https://www.twitter.com/"
            ]
        }
    </script>
    <style>
        /* Safe-area adjustments for mobile devices */
        body {
            padding: env(safe-area-inset);
        }
    </style>
</head>
<body>
    <h1>Welcome to My Website</h1>
    <img src="image1.jpg" loading="lazy" alt="Description of image1">
    <img src="image2.jpg" loading="lazy" alt="Description of image2">

    <svg width="100" height="100">
        <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="red" />
        <!-- Complete Grain SVG Here -->
    </svg>

    <form id="newsletter-form">
        <label for="email">Subscribe to our newsletter:</label>
        <input type="email" id="email" required>
        <button type="submit">Subscribe</button>
    </form>

    <script>
        // Error handling example
        window.addEventListener('error', function (event) {
            console.error('Error occurred:', event.message);
        });
    </script>

    <footer>
        <p>© 2026 My Website. All rights reserved.
        <meta name="description" content="A brief description of the website for SEO purposes">
        <meta name="keywords" content="HTML, CSS, JavaScript, SEO">
     </p>
    </footer>
</body>
</html>
